name: Sync Roadmap from Jira

on:
  schedule:
    # 7 AM UTC Mon–Fri (3 AM ET / midnight PT) — ready before the US workday
    - cron: '0 7 * * 1-5'
  workflow_dispatch:  # allow manual run from the GitHub Actions UI

permissions:
  contents: write  # needed to push the updated HTML commit

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout roadmap-delivery branch
        uses: actions/checkout@v4
        with:
          ref: roadmap-delivery

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run Jira sync
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: python scripts/sync-roadmap.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add doc/roadmap/delivery-roadmap.html
          if git diff --cached --quiet; then
            echo "Nothing to commit — Jira data unchanged."
          else
            git commit -m "Jira refresh $(date -u +%Y-%m-%d): automated sync"
            git push origin roadmap-delivery
          fi
