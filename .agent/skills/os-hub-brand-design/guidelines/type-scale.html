<!-- @dsCard group="Type" viewport="700x230" subtitle="Slide-reference scale (1920×1080); halve for documents" name="Type Scale" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
a{color:var(--link-color)}a:hover{color:var(--link-hover-color)}
.r{display:flex;align-items:baseline;gap:16px;border-bottom:1px solid rgba(13,17,40,.08);padding:2px 0;}
.l{font:600 11px monospace;color:var(--text-muted);width:150px;flex:none;}
</style></head>
<body style="margin:0;background:#fff;padding:10px 20px;">
<div class="r"><div class="l">--text-hero 96</div><div style="font-family:var(--font-display);font-weight:800;font-size:44px;line-height:1;">Hero statement</div></div>
<div class="r"><div class="l">--text-h1 72</div><div style="font-family:var(--font-display);font-weight:800;font-size:34px;line-height:1;">Slide title</div></div>
<div class="r"><div class="l">--text-h2 48</div><div style="font-family:var(--font-display);font-weight:700;font-size:24px;line-height:1;">Section subtitle</div></div>
<div class="r"><div class="l">--text-h3 34</div><div style="font-family:var(--font-display);font-weight:700;font-size:18px;line-height:1;">Card title</div></div>
<div class="r"><div class="l">--text-body-lg 26</div><div style="font-size:14px;">Lead paragraph — DM Sans</div></div>
<div class="r" style="border:none;"><div class="l">--text-body-md 20</div><div style="font-size:12px;">Standard body — DM Sans</div></div>
</body></html>
