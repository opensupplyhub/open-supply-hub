<!-- @dsCard group="Brand" viewport="700x170" subtitle="40% clear space; icon may stand alone; wordmark never without icon" name="Logo Usage" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>a{color:var(--link-color)}a:hover{color:var(--link-hover-color)}
.rule{font:500 12px 'DM Sans';display:flex;gap:8px;align-items:baseline;}
.no{color:var(--osh-red);font-weight:800;}
.yes{color:var(--osh-green);font-weight:800;}</style></head>
<body style="margin:0;background:#fff;display:grid;grid-template-columns:250px 1fr;height:170px;">
<div style="background:var(--surface-page);display:grid;place-items:center;">
  <div style="border:1.5px dashed var(--osh-purple);padding:26px;"><img src="../assets/logos/osh-logo-dark.svg" alt="Open Supply Hub with clear space" style="width:140px;display:block;"></div>
</div>
<div style="padding:16px 22px;display:flex;flex-direction:column;gap:8px;justify-content:center;">
  <div class="rule"><span class="yes">✓</span>Clear space = 40% of icon height on all sides</div>
  <div class="rule"><span class="yes">✓</span>Icon may be used on its own</div>
  <div class="rule"><span class="no">✕</span>Wordmark never appears without the icon</div>
  <div class="rule"><span class="no">✕</span>Don't stretch, compress, or tilt</div>
  <div class="rule"><span class="no">✕</span>No lowercase or light-weight wordmark</div>
</div>
</body></html>
