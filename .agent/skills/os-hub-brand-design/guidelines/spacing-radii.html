<!-- @dsCard group="Spacing" viewport="700x150" subtitle="Flat brand: square blocks, pill buttons, 16px cards, no shadows" name="Radii & Borders" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>a{color:var(--link-color)}a:hover{color:var(--link-hover-color)}</style></head>
<body style="margin:0;background:var(--surface-page);padding:20px 24px;display:flex;gap:24px;align-items:center;">
<div style="width:110px;height:80px;background:var(--osh-yellow);display:grid;place-items:center;font:600 11px 'DM Sans';">square · 0</div>
<div style="width:110px;height:80px;background:#fff;border:var(--border-keyline);border-radius:var(--radius-card);display:grid;place-items:center;font:600 11px 'DM Sans';">card · 16</div>
<div style="padding:12px 28px;background:var(--osh-off-black);color:var(--osh-off-white);border-radius:var(--radius-pill);font:700 13px 'DM Sans';letter-spacing:0.08em;">PILL · 999</div>
<div style="font:500 11px 'DM Sans';color:var(--text-muted);max-width:130px;">No drop shadows anywhere — separation by color.</div>
</body></html>
