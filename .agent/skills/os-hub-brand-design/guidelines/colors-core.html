<!-- @dsCard group="Colors" viewport="700x150" subtitle="The full OSH palette — bright and bold" name="Core Palette" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>a{color:var(--link-color)}a:hover{color:var(--link-hover-color)}</style></head>
<body style="margin:0;background:#fff;">
<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:0;height:110px;">
  <div style="background:var(--osh-off-black)"></div>
  <div style="background:var(--osh-purple)"></div>
  <div style="background:var(--osh-red)"></div>
  <div style="background:var(--osh-pink)"></div>
  <div style="background:var(--osh-green)"></div>
  <div style="background:var(--osh-yellow)"></div>
  <div style="background:var(--osh-off-white);border:1px solid var(--osh-off-black)"></div>
</div>
<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:0;font:600 11px 'DM Sans';padding:6px 0;text-align:center;letter-spacing:0.04em;">
  <div>#0D1128</div><div>#8428FA</div><div>#FF2727</div><div>#FFA6D0</div><div>#62CC74</div><div>#FCCF3F</div><div>#F9F7F7</div>
</div>
</body></html>
