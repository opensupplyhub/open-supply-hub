<!-- @dsCard group="Colors" viewport="700x160" subtitle="Off-white or off-black pages; accents as solid blocks" name="Surfaces & Text" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>a{color:var(--link-color)}a:hover{color:var(--link-hover-color)}</style></head>
<body style="margin:0;display:grid;grid-template-columns:1fr 1fr;height:160px;">
<div style="background:var(--surface-page);padding:20px 24px;">
  <h2 style="font-size:34px;">Light surface</h2>
  <p style="margin:4px 0 0;font-size:14px;">Off-black text on <b>#F9F7F7</b>. Purple <span style="color:var(--accent-primary);font-weight:700;">#8428FA</span> is the lead accent.</p>
</div>
<div style="background:var(--surface-page-dark);padding:20px 24px;">
  <h2 style="font-size:34px;color:var(--text-inverse);">Dark surface</h2>
  <p style="margin:4px 0 0;font-size:14px;color:var(--text-inverse);">Off-white text on <b>#0D1128</b>. Yellow <span style="color:var(--osh-yellow);font-weight:700;">#FCCF3F</span> pops here.</p>
</div>
</body></html>
