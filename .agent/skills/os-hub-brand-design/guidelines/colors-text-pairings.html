<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>a{color:var(--link-color)}a:hover{color:var(--link-hover-color)}
.b{display:grid;place-items:center;font-family:var(--font-display);font-weight:800;font-size:22px;line-height:0.92;}</style></head>
<body style="margin:0;background:#fff;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:1fr 1fr;gap:6px;padding:6px;height:198px;box-sizing:border-box;">
<div class="b" style="background:var(--osh-off-white);border:1px solid rgba(13,17,40,.1);color:var(--osh-off-black);">Dark on light</div>
<div class="b" style="background:var(--osh-off-white);border:1px solid rgba(13,17,40,.1);color:var(--osh-purple);">Dark on light</div>
<div class="b" style="background:var(--osh-yellow);color:var(--osh-off-black);">Dark on light</div>
<div class="b" style="background:var(--osh-green);color:var(--osh-off-black);">Dark on light</div>
<div class="b" style="background:var(--osh-pink);color:var(--osh-off-black);">Dark on light</div>
<div class="b" style="background:var(--osh-purple);color:var(--osh-off-white);">Light on dark</div>
<div class="b" style="background:var(--osh-off-black);color:var(--osh-off-white);">Light on dark</div>
<div class="b" style="background:var(--osh-red);color:var(--osh-off-white);font-size:15px;">Light on dark<br>(sparingly)</div>
</body></html>
