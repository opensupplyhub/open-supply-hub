<!-- @dsCard group="Colors" viewport="700x150" subtitle="Semantic aliases over the base palette" name="Semantic Tokens" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
a{color:var(--link-color)}a:hover{color:var(--link-hover-color)}
.row{display:flex;align-items:center;gap:10px;font:500 13px 'DM Sans';}
.sw{width:28px;height:28px;border-radius:4px;border:1px solid rgba(13,17,40,.15);}
code{font:600 12px monospace;}
</style></head>
<body style="margin:0;background:#fff;padding:14px 20px;">
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px 24px;">
  <div class="row"><div class="sw" style="background:var(--accent-primary)"></div><code>--accent-primary</code></div>
  <div class="row"><div class="sw" style="background:var(--accent-positive)"></div><code>--accent-positive</code></div>
  <div class="row"><div class="sw" style="background:var(--accent-alert)"></div><code>--accent-alert</code></div>
  <div class="row"><div class="sw" style="background:var(--accent-soft)"></div><code>--accent-soft</code></div>
  <div class="row"><div class="sw" style="background:var(--surface-highlight)"></div><code>--surface-highlight</code></div>
  <div class="row"><div class="sw" style="background:var(--osh-green-tint)"></div><code>--osh-green-tint</code></div>
  <div class="row"><div class="sw" style="background:var(--text-body)"></div><code>--text-body</code></div>
  <div class="row"><div class="sw" style="background:var(--surface-page)"></div><code>--surface-page</code></div>
</div>
</body></html>
