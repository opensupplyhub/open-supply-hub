<body style="margin:0;background:#fff;">
<div id="root"></div>
<script type="text/babel">
const { Button, Eyebrow, Tag, Stat, Card, SpeechBubble } = window.OpenSupplyHubDesignSystem_69f06a;

function Demo() {

        <div className="lbl">Eyebrow + Tag</div>
        <div className="row" style={{gap:20}}>
          <Eyebrow>Case Study</Eyebrow>

          <Tag color="yellow">Brands & Retailers</Tag>
          <Tag color="purple">Civil Society</Tag>
          <Tag color="green">Industry Orgs</Tag>

        <div className="lbl">Stat</div>

          <SpeechBubble color="pink">Where was this made?</SpeechBubble>
